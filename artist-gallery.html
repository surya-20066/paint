<script>
function switchMedia(type){
document.querySelectorAll('.media-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.media-grid').forEach(g=>g.classList.remove('active'));
document.getElementById('tab-'+type).classList.add('active');
document.getElementById('grid-'+type).classList.add('active');
}
function openPreview(url, type, title){
const modal = document.getElementById('gallery-preview-modal');
const mImg = document.getElementById('modal-img');
const mVid = document.getElementById('modal-vid');
document.getElementById('modal-title').textContent = title;
if(type === 'image'){
mImg.src = url;
mImg.classList.remove('hidden');
mVid.classList.add('hidden');
mVid.pause();
} else {
mVid.src = url;
mVid.classList.remove('hidden');
mImg.classList.add('hidden');
}
modal.classList.remove('hidden');
modal.classList.add('flex');
}
function closePreview(){
const modal = document.getElementById('gallery-preview-modal');
modal.classList.add('hidden');
modal.classList.remove('flex');
const mVid = document.getElementById('modal-vid');
mVid.pause();
}

}

function initMedia() {
  const postsStored = localStorage.getItem('artist_posts');
  if (postsStored) {
    artistPosts = JSON.parse(postsStored);
  } else {
    artistPosts = defaultPosts;
    localStorage.setItem('artist_posts', JSON.stringify(artistPosts));
  }
  const reelsStored = localStorage.getItem('artist_reels');
  if (reelsStored) {
    artistReels = JSON.parse(reelsStored);
  } else {
    artistReels = defaultReels;
    localStorage.setItem('artist_reels', JSON.stringify(artistReels));
  }
  renderGrids();
}

function triggerEdit(type, idx) {
  const modal = document.getElementById('gallery-edit-modal');
  document.getElementById('edit-item-type').value = type;
  document.getElementById('edit-item-idx').value = idx;
  if (type === 'post') {
    const item = artistPosts[idx];
    document.getElementById('edit-modal-headline').textContent = 'Edit Artwork Details';
    document.getElementById('edit-title').value = item.title;
    document.getElementById('edit-category').value = item.category || 'Madhubani';
    document.getElementById('edit-dimensions').value = item.dimensions || '24Ã—36 in';
    document.getElementById('edit-price').value = item.price;
    document.getElementById('edit-status').value = item.status || 'Available';
    document.getElementById('post-edit-fields').classList.remove('hidden');
  } else {
    const item = artistReels[idx];
    document.getElementById('edit-modal-headline').textContent = 'Edit Reel Title';
    document.getElementById('edit-title').value = item.title;
    document.getElementById('post-edit-fields').classList.add('hidden');
  }
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}
function closeEditModal() {
  const modal = document.getElementById('gallery-edit-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}
function saveEdit(e) {
  e.preventDefault();
  const type = document.getElementById('edit-item-type').value;
  const idx = parseInt(document.getElementById('edit-item-idx').value);
  if (type === 'post') {
    artistPosts[idx].title = document.getElementById('edit-title').value;
    artistPosts[idx].category = document.getElementById('edit-category').value;
    artistPosts[idx].dimensions = document.getElementById('edit-dimensions').value;
    artistPosts[idx].price = parseFloat(document.getElementById('edit-price').value) || 0;
    artistPosts[idx].status = document.getElementById('edit-status').value;
    localStorage.setItem('artist_posts', JSON.stringify(artistPosts));
  } else {
    artistReels[idx].title = document.getElementById('edit-title').value;
    localStorage.setItem('artist_reels', JSON.stringify(artistReels));
  }
  closeEditModal();
  renderGrids();
}
function triggerDelete(type, idx) {
  const confirmed = confirm(`Are you sure you want to delete this ${type === 'post' ? 'artwork post' : 'reel'}?`);
  if (!confirmed) return;
  if (type === 'post') {
    artistPosts.splice(idx, 1);
    localStorage.setItem('artist_posts', JSON.stringify(artistPosts));
  } else {
    artistReels.splice(idx, 1);
    localStorage.setItem('artist_reels', JSON.stringify(artistReels));
  }
  renderGrids();
}
function loadSidebarProfile() {
  const storedProfile = localStorage.getItem('artist_profile_data');
  if (storedProfile) {
    const profile = JSON.parse(storedProfile);
    const sbImg = document.getElementById('sidebar-img');
    const sbName = document.getElementById('sidebar-name');
    const sbRole = document.getElementById('sidebar-role');
    if (sbImg) sbImg.src = profile.photoUrl;
    if (sbName) sbName.textContent = profile.displayName;
    if (sbRole) sbRole.textContent = profile.specialization.toUpperCase();
  }
}
document.addEventListener('DOMContentLoaded', () => {
  initMedia();
  loadSidebarProfile();
});
</script>
</body></html>
