<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Artist Login - The Painted Muse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:wght@400;500;700&family=Caveat:wght@400..700&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(148, 46, 2, 0.08);
        }
        .terracotta-gradient {
            background: linear-gradient(135deg, #a63b10 0%, #942e02 100%);
        }
        .brush-underline {
            position: relative;
        }
        .brush-underline::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 4px;
            background: currentColor;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 Q 25 0 50 10 T 100 10" stroke="black" fill="transparent" stroke-width="2"/></svg>');
            mask-size: cover;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#58423b",
                        "outline": "#8b7169",
                        "surface-container-highest": "#f4ded7",
                        "inverse-on-surface": "#ffede8",
                        "error-container": "#ffdad6",
                        "secondary": "#795900",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#94ccff",
                        "on-tertiary-fixed": "#001d32",
                        "on-tertiary-container": "#dcecff",
                        "primary": "#942e02",
                        "secondary-fixed": "#ffdfa0",
                        "secondary-fixed-dim": "#f6be39",
                        "secondary-container": "#ffc641",
                        "on-error": "#ffffff",
                        "surface-bright": "#fff8f6",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#006faa",
                        "surface-dim": "#ebd5cf",
                        "on-surface": "#241915",
                        "on-secondary-fixed-variant": "#5c4300",
                        "surface": "#fff8f6",
                        "error": "#ba1a1a",
                        "on-background": "#241915",
                        "background": "#fff8f6",
                        "primary-container": "#b5451b",
                        "on-primary-fixed": "#390c00",
                        "surface-container": "#ffe9e3",
                        "surface-tint": "#a63b10",
                        "surface-container-low": "#fff1ed",
                        "on-primary-fixed-variant": "#832600",
                        "on-secondary": "#ffffff",
                        "tertiary": "#005685",
                        "on-secondary-container": "#715300",
                        "tertiary-fixed": "#cde5ff",
                        "inverse-surface": "#3b2d29",
                        "primary-fixed-dim": "#ffb59d",
                        "primary-fixed": "#ffdbd0",
                        "surface-variant": "#f4ded7",
                        "inverse-primary": "#ffb59d",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#ffe4dc",
                        "surface-container-high": "#fae3dd",
                        "outline-variant": "#dfc0b6",
                        "on-secondary-fixed": "#261a00",
                        "on-tertiary-fixed-variant": "#004b74"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "body-md": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "label-sm": ["DM Sans"],
                        "display-xl": ["Playfair Display"],
                        "headline-md": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "painted": ["Caveat", "cursive"],
                        "stylish": ["Dancing Script", "cursive"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen relative overflow-hidden">
    <!-- Soft-focus Artistic Background -->
    <div class="fixed inset-0 z-0">
        <img alt="Background pattern" class="h-full w-full object-cover blur-sm opacity-20 scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCE85tliyBtatM4Sf9CGMCkZrJLQbMkAvenwVo9STCUkhlAfIfFaU5PR6Y48rZ-4KuIoI4eJK09WtYLHNewz2WrIJDF7vSM-QmXbO-njNqxgped5JbFyOnwVHgsDWZQERAp-dpFK6R30NrvKIMYqnkpxBetfDPqAHpWry3YDm8YSkPQM-KnvLHPRK0yBW8Y4uRF9NOADCjtyLuP8ZjuNSGP2x2zmQmYzZS3FzJ2_Td2xvEs6udYptzb_3IbEQmsQO6uBrO3MZdbXeua"/>
        <div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/80 to-primary/5"></div>
    </div>
    
    <div class="relative z-10 flex min-h-screen flex-col lg:flex-row items-center justify-center lg:p-12 p-4">
        <!-- Brand Visual Side (Desktop only, subtle overlay) -->
        <div class="hidden lg:flex w-1/3 flex-col justify-center p-12 text-on-surface">
            <div class="max-w-md">
                <div class="mb-10 flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
    <img src="logo.jpeg" alt="The Painted Muse Logo" class="h-32 w-auto object-contain mb-6 mx-auto" />
</div>
                <h1 class="font-painted mb-6 leading-tight text-5xl text-primary drop-shadow-sm whitespace-nowrap">Join the Living Legacy</h1>
                <p class="font-stylish text-on-surface-variant mb-8 text-4xl leading-relaxed">
                    Become a custodian of heritage. Connect with the masters of Tanjore, Mithila, and Warli art.
                </p>
                <div class="flex items-center gap-4 text-on-surface-variant/80 font-stylish text-3xl">
                    <span>Authenticity</span>
                    <span class="size-2 rounded-full bg-primary/50"></span>
                    <span>Craftsmanship</span>
                </div>
            </div>
        </div>
        
        <!-- Form Side - Glassmorphism Card -->
        <div class="flex w-full lg:w-[540px] flex-col glass-card rounded-xl p-8 lg:p-12 overflow-y-auto max-h-[90vh]">
            <!-- Mobile Header -->
            <div class="lg:hidden mb-10 flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <img src="logo.jpeg" alt="The Painted Muse Logo" class="h-32 w-auto object-contain mb-6 mx-auto" />
            </div>
            
            <!-- Navigation -->
            <div class="mb-10 flex items-center justify-between">
                <a class="group inline-flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" href="index.html">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                    <span class="font-label-sm uppercase tracking-widest text-xs">Back</span>
                </a>
                <div class="flex bg-surface-container-low rounded-full p-1 border border-outline-variant/30">
                    <button class="px-6 py-2 rounded-full bg-white shadow-sm text-on-surface font-bold font-label-sm uppercase tracking-wider transition-all text-xs">Login</button>
                    <button onclick="window.location.href='dashboard.html'" class="px-6 py-2 rounded-full text-on-surface-variant font-label-sm uppercase tracking-wider transition-all text-xs">Sign Up</button>
                </div>
            </div>
            
            <div class="w-full">
                <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='artist-home.html';">
                    <!-- Email Field -->
                    <div class="space-y-1 text-left">
                        <label class="block text-on-surface-variant font-label-sm uppercase tracking-widest text-[10px]" for="email">Email Address</label>
                        <div class="relative group">
                            <input required class="w-full bg-white/50 border border-outline-variant/30 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md text-on-surface text-sm" id="email" placeholder="artist@paintedmuse.com" type="email"/>
                            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">mail</span>
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-1 text-left">
                        <label class="block text-on-surface-variant font-label-sm uppercase tracking-widest text-[10px]" for="password">Password</label>
                        <div class="relative group">
                            <input required class="w-full bg-white/50 border border-outline-variant/30 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md text-on-surface text-sm" id="password" placeholder="••••••••" type="password"/>
                            <span id="togglePassword" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'; this.textContent = p.type === 'password' ? 'visibility_off' : 'visibility';" class="material-symbols-outlined absolute right-12 top-1/2 -translate-y-1/2 text-primary/40 cursor-pointer hover:text-primary transition-colors">visibility_off</span>
                            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">lock</span>
                        </div>
                    </div>
                    <div class="flex justify-end">
                        <a class="font-label-sm text-primary hover:opacity-80 transition-opacity border-b border-transparent hover:border-primary text-xs" href="#">
                            Forgot Password?
                        </a>
                    </div>
                    <div class="pt-4">
                        <button class="w-full terracotta-gradient text-on-primary py-4 px-8 rounded-lg font-label-sm uppercase tracking-[0.2em] hover:shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-3 active:scale-[0.98] text-xs font-bold" type="submit">
                            <span class="">Sign In To Your Legacy</span>
                            <span class="material-symbols-outlined text-[18px]">brush</span>
                        </button>
                    </div>
                </form>
                <div class="mt-8">
                    <div class="relative flex items-center mb-8">
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                        <span class="px-4 text-on-surface-variant/50 font-label-sm text-[10px] uppercase tracking-widest">Or login using</span>
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                    </div>
                    <div class="flex justify-center gap-4">
                        <button onclick="window.location.href='artist-home.html'" class="flex-1 h-12 bg-white/50 border border-outline-variant/30 rounded-lg flex items-center justify-center hover:bg-white transition-all group">
                            <svg class="size-5 text-on-surface group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.92 3.12-1.92 4.12-1.12 1.12-2.8 2.32-5.92 2.32-5.12 0-9.2-4.16-9.2-9.28s4.08-9.28 9.2-9.28c2.8 0 4.96 1.08 6.64 2.72l2.32-2.32c-2.16-2.04-5.2-3.6-8.96-3.6-7.28 0-13.36 5.88-13.36 13.12s6.08 13.12 13.36 13.12c3.92 0 6.92-1.28 9.32-3.76 2.4-2.4 3.16-5.76 3.16-8.48 0-.64-.04-1.24-.12-1.84h-12.32z"></path></svg>
                        </button>
                        <button onclick="window.location.href='artist-home.html'" class="flex-1 h-12 bg-white/50 border border-outline-variant/30 rounded-lg flex items-center justify-center hover:bg-white transition-all group">
                            <svg class="size-5 text-on-surface group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Floating Decorative Element -->
    <div class="fixed top-12 right-12 pointer-events-none opacity-40 hidden lg:block animate-pulse">
        <svg class="text-primary" fill="none" height="160" viewbox="0 0 100 100" width="160">
            <path d="M50 0C22.4 0 0 22.4 0 50C0 77.6 22.4 100 50 100C77.6 100 100 77.6 100 50C100 22.4 77.6 0 50 0ZM50 90C27.9 90 10 72.1 10 50C10 27.9 27.9 10 50 10C72.1 10 90 27.9 90 50C90 72.1 72.1 90 50 90Z" fill="currentColor" fill-opacity="0.1"></path>
            <circle cx="50" cy="50" fill="currentColor" fill-opacity="0.05" r="30"></circle>
        </svg>
    </div>
</body>
</html>
