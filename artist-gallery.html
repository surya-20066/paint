function switchMedia(type) {
document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
document.querySelectorAll('.media-grid').forEach(g => g.classList.remove('active'));
document.getElementById('tab-' + type).classList.add('active');
document.getElementById('grid-' + type).classList.add('active');
}
function openPreview(url, type, title) {
const modal = document.getElementById('gallery-preview-modal');
const mImg = document.getElementById('modal-img');
const mVid = document.getElementById('modal-vid');
document.getElementById('modal-title').textContent = title;
if (type === 'image') {
mImg.src = url;
mImg.classList.remove('hidden');
mVid.classList.add('hidden');
mVid.pause();
} else {
mVid.src = url;
mVid.classList.remove('hidden');
mImg.classList.add('hidden');
}
modal.classList.remove('hidden');
modal.classList.add('flex');
}
function closePreview() {
const modal = document.getElementById('gallery-preview-modal');
modal.classList.add('hidden');
modal.classList.remove('flex');
const mVid = document.getElementById('modal-vid');
mVid.pause();
}
document.addEventListener('keydown', e => {
if (e.key === 'Escape') {
closePreview();
closeEditModal();
}
});

const dbName = "ReelsDB";
const storeName = "videos";
let db;
function initDB() {
return new Promise((resolve, reject) => {
const request = indexedDB.open(dbName, 1);
request.onerror = event => reject(event.target.error);
request.onsuccess = event => {
db = event.target.result;
resolve(db);
};
request.onupgradeneeded = event => {
const db = event.target.result;
if (!db.objectStoreNames.contains(storeName)) {
db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
}
};
});
}

async function initMedia() {
const user = JSON.parse(localStorage.getItem('currentUser'));
if (!user) {
window.location.href = 'signin.html';
return;
}
const usersDb = JSON.parse(localStorage.getItem('users') || '{}');
const userInDb = usersDb[user.email];
if (!userInDb || !userInDb.isApproved) {
window.location.href = 'signin.html?error=pending';
return;
}
const postsKey = 'artist_posts_' + user.email;
const postsStored = localStorage.getItem(postsKey);
if (postsStored) {
artistPosts = JSON.parse(postsStored);
} else {
if (user.isNewUser) {
artistPosts = [];
} else {
artistPosts = defaultPosts;
localStorage.setItem(postsKey, JSON.stringify(artistPosts));
}
}
try {
await initDB();
const transaction = db.transaction([storeName], "readonly");
const store = transaction.objectStore(storeName);
const request = store.getAll();
request.onsuccess = () => {
const allReels = request.result || [];
artistReels = allReels.filter(r => r.userEmail === user.email);
if (artistReels.length === 0 && !user.isNewUser) {
artistReels = defaultReels;
}
renderGrids();
};
} catch (err) {
console.error("IDB Init failed:", err);
artistReels = user.isNewUser ? [] : defaultReels;
renderGrids();
}
}
function renderGrids() {

const gridPosts = document.getElementById('grid-posts');

const isSold = post.status === 'Sold';
const postDiv = document.createElement('div');
postDiv.className = `bg-surface-container-lowest border border-outline-variant rounded-xl group cursor-pointer hover:shadow-lg transition-all overflow-hidden flex flex-col`;
postDiv.onclick = () => openPreview(post.imgUrl, 'image', post.title);
postDiv.innerHTML = `
<div class="aspect-square bg-surface-variant overflow-hidden relative">
<img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${isSold ? 'grayscale-[30%]' : ''}" src="${post.imgUrl}" onerror="this.src='https://placehold.co/600x600/F5F0E8/B5451B?text=Artwork+Preview'"/>
<span class="absolute top-2 right-2 ${isSold ? 'bg-on-surface text-surface' : 'bg-green-700 text-white'} text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full">${post.status}</span>

function triggerEdit(type, idx) {
const modal = document.getElementById('gallery-edit-modal');
document.getElementById('edit-item-type').value = type;
document.getElementById('edit-item-idx').value = idx;
if (type === 'post') {
const item = artistPosts[idx];
document.getElementById('edit-modal-headline').textContent = 'Edit Artwork Details';
document.getElementById('edit-title').value = item.title;
document.getElementById('edit-category').value = item.category || 'Madhubani';
document.getElementById('edit-dimensions').value = item.dimensions || '24×36 in';
document.getElementById('edit-price').value = item.price;
document.getElementById('edit-status').value = item.status || 'Available';
document.getElementById('post-edit-fields').classList.remove('hidden');
} else {
const item = artistReels[idx];
document.getElementById('edit-modal-headline').textContent = 'Edit Reel Title';
document.getElementById('edit-title').value = item.title;
document.getElementById('post-edit-fields').classList.add('hidden');
}
modal.classList.remove('hidden');
modal.classList.add('flex');
}
function closeEditModal() {
const modal = document.getElementById('gallery-edit-modal');
modal.classList.add('hidden');
modal.classList.remove('flex');
}
function saveEdit(e) {
e.preventDefault();
const type = document.getElementById('edit-item-type').value;
const idx = parseInt(document.getElementById('edit-item-idx').value);
const user = JSON.parse(localStorage.getItem('currentUser'));
if (type === 'post') {
artistPosts[idx].title = document.getElementById('edit-title').value;
artistPosts[idx].category = document.getElementById('edit-category').value;
artistPosts[idx].dimensions = document.getElementById('edit-dimensions').value;
artistPosts[idx].price = parseFloat(document.getElementById('edit-price').value) || 0;
artistPosts[idx].status = document.getElementById('edit-status').value;
if (user) {
localStorage.setItem('artist_posts_' + user.email, JSON.stringify(artistPosts));
} else {
localStorage.setItem('artist_posts', JSON.stringify(artistPosts));
}
} else {
artistReels[idx].title = document.getElementById('edit-title').value;
if (artistReels[idx].id) {
const transaction = db.transaction([storeName], "readwrite");
transaction.objectStore(storeName).put(artistReels[idx]);
} else {
localStorage.setItem('artist_reels', JSON.stringify(artistReels));
}
}
closeEditModal();
renderGrids();
}
function triggerDelete(type, idx) {
const confirmed = confirm(`Are you sure you want to delete this ${type === 'post' ? 'artwork post' : 'reel'}?`);
if (!confirmed) return;
const user = JSON.parse(localStorage.getItem('currentUser'));
if (type === 'post') {
artistPosts.splice(idx, 1);
if (user) {
localStorage.setItem('artist_posts_' + user.email, JSON.stringify(artistPosts));
} else {
localStorage.setItem('artist_posts', JSON.stringify(artistPosts));
}
renderGrids();
} else {
const reel = artistReels[idx];
if (reel.id) {
const transaction = db.transaction([storeName], "readwrite");
const request = transaction.objectStore(storeName).delete(reel.id);
request.onsuccess = () => {
artistReels.splice(idx, 1);
renderGrids();
};
} else {
artistReels.splice(idx, 1);
localStorage.setItem('artist_reels', JSON.stringify(artistReels));
renderGrids();
}
}
}
